services:
  - type: web
    name: 4k-upscale-backend
    env: python
    buildCommand: "pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu && pip install basicsr --no-deps && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
